<!DOCTYPE html>
<html lang="en-us">
<head>
	<title>Dark Design - Corrupt the World</title>
	<link rel="stylesheet" type="text/css" href="main.css" />
	<script src="core.js" type="text/javascript"></script>
</head>
<body>
	<nav id="topNav">Dark Design - Corrupt the World</nav>

	<div id="game">
		<div class="column" id="leftblock">
			<!-- look at css grid layout for multiple resources -->

			<div class="resource" id="res0row">
				<div class="resourceName" id="resCorruption">Corruption:</div>
				<div class="resourceValue" id="corruptionCurrent"></div>
				<div class="resourceMax" id="corruptionMax"></div>
				<div class="resourcePer" id="corruptionPer"></div>
			</div>

			<div class="resource" id="res1row">
				<div class="resourceName" id="resPrey">Prey:</div> 
				<div class="resourceValue" id="preyCurrent"></div>
				<div class="resourceMax" id="preyMax"></div>
				<div class="resourcePer" id="preyPer"></div>
			</div>
			
			<div class="resource hidden" id="res2row">
				<div class="resourceName" id="resSustenance">Sustenance:</div>
				<div class="resourceValue" id="sustenanceCurrent"></div>
				<div class="resourceMax" id="sustenanceMax"></div>
				<div class="resourcePer" id="sustenancePer"></div>

			</div>

			<div class="resource hidden" id="res3row">
				<div class="resourceName" id="resCholer">Choler:</div> 
				<div class="resourceValue" id="cholerCurrent"></div>
				<div class="resourceMax" id="cholerMax"></div>
				<div class="resourcePer" id="cholerPer"></div>
			</div>

			<div class="resource hidden" id="res4row">
				<div class="resourceName" id="resNative">Natives:</div> 
				<div class="resourceValue" id="nativeCurrent"></div>
				<div class="resourceMax" id="nativeMax"></div>
				<div class="resourcePer" id="nativePer"></div>
			</div>

			<div class="resource hidden" id="res5row">
				<div class="resourceName" id="resHost">Hosts:</div> 
				<div class="resourceValue" id="hostCurrent"></div>
				<div class="resourceMax" id="hostMax"></div>
				<div class="resourcePer" id="hostPer"></div>
			</div>
		</div>
			
		<div class="column" id="midblock">
			<nav id="tabNav"></nav>
			<div class="buttonMap2" id="fillGrid"></div> <!-- fillable DIV for use by BuildGrid -->
		</div>  <!-- end midblock -->
				
		<div id="rightblock" class="column">
			<div id="calendarBlock">default</div>
			<div id="baseDevButtons">
				<p>Dev buttons temp space</p>
				<p>js version: <span id="jsVersion"></span></p>
				<p><a href="main.css">load main.css</a></p>
				<p><a href="core.js">load core.js</a></p>
			</div>
			<div id="devButtons"></div>		
			<div id="messagebox">
				<p></p>
			</div>
		
		</div>
	</div>
<!-- script>loadGame();</script> -->
	
</body>
</html>
